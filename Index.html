<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Survivor</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background">
    <div class="grid"></div>
</div>

<div class="hud">

    <div class="logo">
        NEON SURVIVOR
    </div>

    <div class="stats">
        <div>
            SCORE
            <span id="score">0</span>
        </div>

        <div>
            ENERGY
            <span id="energy">100</span>%
        </div>

        <div>
            LEVEL
            <span id="level">1</span>
        </div>
    </div>

</div>


<div id="game">

    <div id="player">
        <div class="core"></div>
    </div>


    <div id="startScreen">

        <h1>NEON SURVIVOR</h1>

        <p>
            Überlebe die Neon-Arena.
            Sammle Energie.
            Weiche den Drohnen aus.
        </p>

        <button id="startButton">
            START MISSION
        </button>

    </div>


</div>


<div class="controls">
    WASD / Pfeiltasten zum Bewegen
</div>



<script>

const player = document.getElementById("player");
const game = document.getElementById("game");

const scoreText = document.getElementById("score");
const energyText = document.getElementById("energy");
const levelText = document.getElementById("level");

const startButton = document.getElementById("startButton");
const startScreen = document.getElementById("startScreen");


let playing = false;

let x = 50;
let y = 50;

let score = 0;
let energy = 100;
let level = 1;


let keys = {};



document.addEventListener("keydown", e=>{
    keys[e.key] = true;
});


document.addEventListener("keyup", e=>{
    keys[e.key] = false;
});



function movePlayer(){

    if(!playing) return;


    let speed = 0.8;


    if(keys["ArrowLeft"] || keys["a"])
        x -= speed;


    if(keys["ArrowRight"] || keys["d"])
        x += speed;


    if(keys["ArrowUp"] || keys["w"])
        y -= speed;


    if(keys["ArrowDown"] || keys["s"])
        y += speed;



    x=Math.max(3,Math.min(97,x));
    y=Math.max(5,Math.min(95,y));


    player.style.left=x+"%";
    player.style.top=y+"%";


    requestAnimationFrame(movePlayer);

}




function createEnemy(){

    if(!playing)return;


    let enemy=document.createElement("div");

    enemy.className="enemy";


    enemy.style.left=Math.random()*95+"%";
    enemy.style.top="-50px";


    game.appendChild(enemy);



    let fall=setInterval(()=>{

        if(!playing){
            clearInterval(fall);
            return;
        }


        let top=parseFloat(enemy.style.top);

        enemy.style.top=top+0.7+"px";


        let p=player.getBoundingClientRect();
        let e=enemy.getBoundingClientRect();



        if(
            p.left<e.right &&
            p.right>e.left &&
            p.top<e.bottom &&
            p.bottom>e.top
        ){

            energy-=20;
            energyText.textContent=energy;


            enemy.remove();
            clearInterval(fall);


            if(energy<=0)
                gameOver();

        }



        if(top>window.innerHeight){
            score++;
            scoreText.textContent=score;


            if(score%10===0){
                level++;
                levelText.textContent=level;
            }


            enemy.remove();
            clearInterval(fall);
        }



    },10);

}



function gameOver(){

    playing=false;

    alert(
        "MISSION FAILED\nScore: "+score
    );

    location.reload();

}




startButton.onclick=()=>{

    playing=true;

    startScreen.style.display="none";


    movePlayer();


    setInterval(createEnemy,700);

};



</script>


</body>
</html>
